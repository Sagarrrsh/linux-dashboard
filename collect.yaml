---
- name: Linux Audit Collection
  hosts: targets
  gather_facts: yes
  become: yes

  tasks:
    - name: Collect system info
      set_fact:
        audit_data:
          hostname: "{{ ansible_hostname }}"
          ip: "{{ ansible_default_ipv4.address | default(inventory_hostname) }}"
          os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
          kernel: "{{ ansible_kernel }}"
          uptime_seconds: "{{ ansible_uptime_seconds }}"
          cpu_count: "{{ ansible_processor_vcpus }}"
          ram_mb: "{{ ansible_memtotal_mb }}"
          status: "Online"
          last_seen: "{{ ansible_date_time.iso8601 }}"

    - name: Check disk usage
      command: df -h /
      register: disk_info
      changed_when: false

    - name: Parse disk usage
      set_fact:
        disk_usage: "{{ disk_info.stdout_lines[1].split()[4] }}"

    - name: Write report row to controller
      delegate_to: localhost
      lineinfile:
        path: "{{ playbook_dir }}/data/reports/latest_report.csv"
        line: >-
          {{ audit_data.hostname }},{{ audit_data.ip }},{{ audit_data.os }},
          {{ audit_data.kernel }},{{ audit_data.uptime_seconds }},
          {{ audit_data.cpu_count }},{{ audit_data.ram_mb }},
          {{ disk_usage }},{{ audit_data.status }},{{ audit_data.last_seen }}
        create: yes

  handlers: []

- name: Initialise report with headers
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Ensure reports directory exists
      file:
        path: "{{ playbook_dir }}/data/reports"
        state: directory
        mode: '0755'

    - name: Write CSV header if file is missing
      copy:
        dest: "{{ playbook_dir }}/data/reports/latest_report.csv"
        content: "Hostname,IP,OS,Kernel,UptimeSeconds,CPUs,RAM_MB,DiskUsage,Status,LastSeen\n"
        force: no
