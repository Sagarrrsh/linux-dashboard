version: "3.9"

services:
  audit-dashboard:
    build: .
    container_name: linux-audit-dashboard
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./vault-keys:/app/vault-keys:ro
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
